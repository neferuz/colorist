<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Colorist Pulatov</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #f0f0f0;
            --muted-color: #666666;
            --accent-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --font-main: 'Geist', 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 🎬 Analog Cinematic Grain */
        body::before {
            content: '';
            position: fixed;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
            animation: noise 0.4s steps(4) infinite;
        }

        @keyframes noise {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            30% { transform: translate(1%, -3%); }
            50% { transform: translate(-1%, 3%); }
            70% { transform: translate(2%, 1%); }
            90% { transform: translate(-2%, -1%); }
        }

        /* Dotted Grid Background */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            opacity: 0.5;
            pointer-events: none;
        }

        /* 📟 Premium Floating Island Navigation */
        .gsap-nav {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 48px;
            z-index: 1000;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 14px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: border-color var(--transition);
        }

        .gsap-nav:hover { border-color: rgba(255, 255, 255, 0.15); }

        .logo {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--text-color);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 32px; }

        .nav-links a {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: color var(--transition);
        }

        .nav-links a:hover, .nav-links a.active { color: #fff; }

        .nav-time {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted-color);
            font-variant-numeric: tabular-nums;
            padding-left: 24px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 🍔 Burger Button Style */
        .burger-btn {
            display: none;
            flex-direction: column;
            gap: 6px;
            width: 24px;
            padding: 10px 0;
            cursor: pointer;
            z-index: 1001;
        }

        .burger-btn span {
            display: block;
            width: 100%;
            height: 1px;
            background: #fff;
            transition: transform 0.4s cubic-bezier(0.7, 0, 0.2, 1);
        }

        /* 📱 Mobile Menu Overlay */
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(30px);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.7, 0, 0.2, 1);
        }

        .mobile-menu-overlay.active { opacity: 1; pointer-events: auto; }

        .mobile-menu-inner { display: flex; flex-direction: column; align-items: flex-end; gap: 20px; }

        .mobile-link {
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            color: #fff;
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 0.5s, transform 0.5s;
            line-height: 1;
            text-decoration: none;
        }

        .mobile-menu-overlay.active .mobile-link { opacity: 1; transform: translateX(0); }

        .gsap-nav.menu-open #burger-toggle span:nth-child(1) { transform: translateY(4px) rotate(45deg); }
        .gsap-nav.menu-open #burger-toggle span:nth-child(2) { transform: translateY(-3px) rotate(-45deg); }

        @media (max-width: 900px) {
            .gsap-nav { 
                width: calc(100% - 40px); 
                justify-content: space-between; 
                padding: 10px 20px; 
                border-radius: 40px;
                gap: 20px;
            }
            .nav-links { display: none; }
            .burger-btn { display: flex; }
            .nav-time { display: block; border: none; padding: 0; font-size: 11px; margin-left: auto; }
            .logo { font-size: 11px; }
        }

        /* Contact Section Styles */
        .contact-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 200px 80px 100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 120px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .contact-title {
            font-size: clamp(50px, 7vw, 100px); /* Slightly reduced size to fit */
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.05em;
            width: max-content; /* Prevent internal wrapping */
        }

        .contact-description {
            font-size: 18px;
            line-height: 1.6;
            color: #ccc;
            max-width: 500px;
        }

        /* Form Styling */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .form-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted-color);
        }

        .form-input, .form-textarea, .form-select {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 0;
            color: #fff;
            font-size: 18px;
            font-family: var(--font-main);
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-bottom-color: #fff;
        }

        .form-textarea {
            resize: none;
            height: 120px;
        }

        .form-select {
            appearance: none;
            cursor: pointer;
        }

        .submit-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 24px 60px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: max-content;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #eee;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Footer Style (Synced with index2) */
        footer {
            padding: 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--muted-color);
            position: relative;
            z-index: 5;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-socials { display: flex; gap: 24px; }
        .footer-socials a {
            color: var(--muted-color);
            font-weight: 500;
            transition: color 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
        }
        .footer-socials a:hover { color: #fff; }

        @media (max-width: 1000px) {
            .contact-container {
                grid-template-columns: 1fr;
                padding: 150px 40px 100px;
                gap: 60px;
            }
            footer { padding: 40px; flex-direction: column; gap: 24px; text-align: center; }
        }

        @media (max-width: 600px) {
            .contact-container { padding: 120px 24px 80px; }
            .contact-title { font-size: 60px; }
            .submit-btn { width: 100%; }
        }

        /* HUD elements for form */
        .hud-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: #fff;
            transition: width 0.6s cubic-bezier(0.7, 0, 0.2, 1);
        }
        .form-input:focus ~ .hud-line, .form-textarea:focus ~ .hud-line, .form-select:focus ~ .hud-line {
            width: 100%;
        }

    </style>
</head>
<body>

    <div class="grid-pattern"></div>

    <nav class="gsap-nav">
        <a href="index.html" class="logo">E. PULATOV</a>
        <div class="nav-links">
            <a href="index.html#main">Main</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contacts.html" class="active">Contacts</a>
        </div>
        <div class="nav-time" id="local-time">--:--</div>
        <div class="burger-btn" id="burger-toggle"><span></span><span></span></div>
    </nav>

    <div class="mobile-menu-overlay" id="mobile-menu">
        <div class="mobile-menu-inner">
            <a href="index.html#main" class="mobile-link">Main</a>
            <a href="portfolio.html" class="mobile-link">Portfolio</a>
            <a href="contacts.html" class="mobile-link">Contacts</a>
        </div>
    </div>

    <main class="contact-container">
        <div class="contact-info">
            <h1 class="contact-title gsap-reveal">Let's build<br>together</h1>
            <p class="contact-description gsap-reveal">Ready to elevate your visual storytelling? Drop your details and project info, and I will get back to you with a tailored approach.</p>
        </div>

        <form class="contact-form gsap-reveal" id="contact-form">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" placeholder="Xasanov Feruz" required>
                <div class="hud-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="notferuz@gmail.com" required>
                <div class="hud-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Budget</label>
                <select class="form-select" required>
                    <option value="" disabled selected>Select range</option>
                    <option value="1k-2k">$1,000 - $2,000</option>
                    <option value="2k-5k" selected>$2,000 - $5,000</option>
                    <option value="5k-10k">$5,000 - $10,000</option>
                    <option value="10k+">$10,000 +</option>
                </select>
                <div class="hud-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea class="form-textarea" placeholder="Briefly describe your brand and project"></textarea>
                <div class="hud-line"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Submit</button>
        </form>
    </main>

    <footer>
        <div class="footer-left">&copy; 2026 E. PULATOV</div>
        <div class="footer-socials">
            <a href="https://instagram.com" target="_blank">Ig</a>
            <a href="https://t.me" target="_blank">Tg</a>
            <a href="https://youtube.com" target="_blank">Yt</a>
        </div>
    </footer>

    <script>
        const lenis = new Lenis({ lerp: 0.08, smoothWheel: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);

        function updateTime() {
            const timeEl = document.getElementById('local-time');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Tashkent', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (timeEl) timeEl.textContent = 'Tashkent, ' + timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Reveal Animations
        gsap.to('.gsap-nav', { opacity: 1, y: 0, duration: 1.5, ease: "expo.out", delay: 0.3 });
        gsap.from('.gsap-reveal', {
            y: 50, opacity: 0, duration: 1.5, stagger: 0.2, ease: "expo.out", delay: 0.5
        });

        // Burger Menu
        const burgerBtn = document.getElementById('burger-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const navBar = document.querySelector('.gsap-nav');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        function toggleMenu() {
            const isOpen = mobileMenu.classList.toggle('active');
            navBar.classList.toggle('menu-open');
            document.body.style.overflow = isOpen ? 'hidden' : '';
            if (isOpen) {
                gsap.fromTo(".mobile-link", { opacity: 0, x: 40 }, { opacity: 1, x: 0, duration: 0.6, stagger: 0.08, ease: "power4.out", delay: 0.2 });
            }
        }
        if(burgerBtn) burgerBtn.addEventListener('click', toggleMenu);
        mobileLinks.forEach(link => link.addEventListener('click', toggleMenu));

        // Form Submit Feedback
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Sending...';
            setTimeout(() => {
                submitBtn.textContent = 'Message Sent';
                submitBtn.style.background = '#00ff00';
                form.reset();
            }, 1500);
        });
    </script>
</body>
</html>
